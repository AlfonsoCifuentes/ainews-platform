name: 🔧 News Content Maintenance

on:
  schedule:
    # Run ONCE daily at 5 AM UTC (after curation at midnight, 6h, 12h, 18h)
    # ⚠️ Reduced from 2x/day to 1x/day - maintain-news.ts now has version tracking
    # to avoid reprocessing articles that already have rewrite_version >= 2
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      rewrite_days:
        description: "Days of articles to rewrite (default: 3)"
        required: false
        default: "3"
      dry_run:
        description: "Dry run (preview only)"
        required: false
        default: "false"
      force_upgrade:
        description: "Force upgrade all articles (ignore rewrite tracking) - USE WITH CAUTION"
        required: false
        default: "false"

jobs:
  maintain-news:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run News Maintenance (Rewrite with GPT-4o-mini)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          AI_MODEL_PROFILE: cost-balanced
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force_upgrade }}" = "true" ]; then
            FLAGS="$FLAGS --rewrite-all"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          DAYS="${{ github.event.inputs.rewrite_days || '3' }}"
          echo "🔧 Maintaining news content (last ${DAYS} days)..."
          npm run ai:maintain-news -- --rewrite-days="${DAYS}" ${FLAGS}

      - name: 📈 Upgrade Uncurated Articles (if any)
        if: success() && secrets.OPENAI_API_KEY != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "📈 Checking for articles needing GPT-4o-mini upgrade..."
          FLAGS="--execute --needs-upgrade --limit 20"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--needs-upgrade --limit 20"
          fi
          npx tsx scripts/upgrade-news-content.ts ${FLAGS}

      - name: 🧹 Repair polluted content and stock images
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🧹 Repairing noisy article content and non-original images..."
          npx tsx scripts/repair-news-quality.ts --execute --limit=60 --parallel=2

      - name: 🖼️ Enforce original image coverage (>=90%)
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "🧪 Dry-run mode: checking image coverage"
            npx tsx scripts/restore-original-article-images.ts --all --parallel=3 --target-ratio=0.90
          else
            echo "🖼️ Recovering originals and enforcing >=90% coverage"
            npx tsx scripts/restore-original-article-images.ts --all --execute --parallel=3 --target-ratio=0.90 --hide-unresolved --require-target
          fi
        timeout-minutes: 45

      - name: 🔗 Repair stale/broken image URLs (weekly, Sundays)
        # HEAD-checking every article is expensive, so only run on Sundays
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DOW="$(date +%u)"  # ISO: 1=Mon ... 7=Sun
          if [ "$DOW" != "7" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "⏭️ Stale check skipped (only runs on Sundays, today DOW=$DOW)"
            exit 0
          fi
          echo "🔗 Checking for articles with broken image URLs (last 30 days)..."
          npx tsx scripts/restore-original-article-images.ts --execute --stale --stale-days=30 --parallel=3 --all
        timeout-minutes: 30
        continue-on-error: true

      - name: 🗑️ Prune storage (logs 14d + old illustrations)
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🗑️ Pruning stale ai_system_logs (keep 14d)..."
          npx tsx scripts/emergency-storage-cleanup.ts --execute --logs-only --keep-logs-days=14
          echo "🗑️ Pruning old module illustration duplicates (keep 1 per slot)..."
          npx tsx scripts/emergency-storage-cleanup.ts --execute --illustrations-only --keep-illustrations=1
          echo "📊 Storage health check:"
          npx tsx scripts/emergency-storage-cleanup.ts --check
        continue-on-error: true

      - name: ✅ Log completion
        if: success()
        run: |
          echo "✅ News maintenance completado"
          echo "⏰ Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

      - name: ❌ Log failure
        if: failure()
        run: |
          echo "❌ News maintenance falló"
          echo "Revisar logs para más detalles"
