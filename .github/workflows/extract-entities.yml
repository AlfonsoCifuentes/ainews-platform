name: 🕸️ Knowledge Graph - Entity Extraction

on:
  schedule:
    # Ejecutar diariamente a las 4:00 AM UTC (después de news curation)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of recent articles to process'
        required: false
        default: '50'

jobs:
  extract-entities:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🕸️ Extract Entities
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🕸️ Extracting entities from recent articles..."
          npm run ai:extract-entities -- ${{ github.event.inputs.limit || '50' }}

      - name: ✅ Log completion
        if: success()
        run: |
          echo "✅ Entity extraction completado"
          echo "⏰ Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

      - name: ❌ Log failure
        if: failure()
        run: |
          echo "❌ Entity extraction falló"
          exit 1
