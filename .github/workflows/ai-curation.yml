name: AI News Curation

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      dry_run:
        description: 'Dry run (don''t store articles)'
        required: false
        default: 'false'

jobs:
  curate-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug - Check secrets availability
        run: |
          echo "🔍 Checking which secrets are available..."
          echo "NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' && '✓ Set' || '✗ Missing' }}"
          echo "SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && '✓ Set' || '✗ Missing' }}"
          echo "OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' && '✓ Set (GPT-4o-mini enabled)' || '✗ Missing (fallback to free providers)' }}"
          echo "GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY != '' && '✓ Set' || '✗ Missing' }}"
          echo "OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY != '' && '✓ Set' || '✗ Missing' }}"
          echo "GROQ_API_KEY: ${{ secrets.GROQ_API_KEY != '' && '✓ Set' || '✗ Missing' }}"

      - name: Run AI curation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL_PROFILE: cost-balanced
          REQUIRE_VALUE_ADDED_REWRITE: 'true'
          ALLOW_ORIGINAL_CONTENT_ON_REWRITE_FAILURE: 'true'
          USE_FALLBACK_IMAGES: 'false'
          STRICT_ORIGINAL_IMAGE: 'true'
          MAX_RSS_CANDIDATES: '220'
          MAX_ARTICLES_TO_PROCESS: '25'
          CLASSIFICATION_CONCURRENCY: '2'
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: npm run ai:curate
        timeout-minutes: 60

      - name: Recover original images and enforce >=90% coverage
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "🧪 Dry-run mode: checking coverage without DB writes"
            npx tsx scripts/restore-original-article-images.ts --all --parallel=3 --target-ratio=0.90
          else
            echo "🖼️ Restoring original images and enforcing >=90% coverage"
            npx tsx scripts/restore-original-article-images.ts --all --execute --parallel=3 --target-ratio=0.90 --hide-unresolved --require-target
          fi
        timeout-minutes: 45

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: curation-logs
          path: |
            *.log
            logs/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ AI curation failed at $(date)"
          echo "Check artifacts for detailed logs"
          echo "At least one LLM API key must be configured in repository secrets"

