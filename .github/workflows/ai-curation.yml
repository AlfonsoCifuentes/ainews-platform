name: AI News Curation

on:
  schedule:
    # Daily morning ingestion (~07:00–08:00 Europe/Madrid) + a midday refresh so
    # the front page always shows current news.
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      dry_run:
        description: "Dry run (don't store articles)"
        required: false
        default: "false"

jobs:
  curate-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run AI curation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL_PROFILE: cost-balanced
          REQUIRE_VALUE_ADDED_REWRITE: "true"
          ALLOW_ORIGINAL_CONTENT_ON_REWRITE_FAILURE: "true"
          # Original photo whenever possible; a local category fallback ONLY when
          # the original is impossible (instead of hiding the article).
          USE_FALLBACK_IMAGES: "true"
          STRICT_ORIGINAL_IMAGE: "true"
          MAX_RSS_CANDIDATES: "220"
          MAX_ARTICLES_TO_PROCESS: "25"
          CLASSIFICATION_CONCURRENCY: "2"
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: npm run ai:curate
        timeout-minutes: 60

      - name: Recover original images and enforce >=90% coverage
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "🧪 Dry-run mode: checking coverage without DB writes"
            npx tsx scripts/restore-original-article-images.ts --all --parallel=3 --target-ratio=0.90
          else
            echo "🖼️ Restoring original images (articles without one keep a category fallback, not hidden)"
            npx tsx scripts/restore-original-article-images.ts --all --execute --parallel=3 --target-ratio=0.90
          fi
        timeout-minutes: 45

      - name: 🛰️ Cluster stories by multi-source corroboration
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🛰️ Clustering the same story across independent outlets and scoring importance..."
          npm run ai:cluster -- --days 5
        timeout-minutes: 20
        continue-on-error: true

      - name: 🛡️ Watermark sweep (strip outlet-branded photos)
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🛡️ OCR-scanning recent images for outlet watermarks/credits..."
          npm run ai:scan-watermarks -- --days 2 --execute
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: curation-logs
          path: |
            *.log
            logs/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ AI curation failed at $(date)"
          echo "Check artifacts for detailed logs"
          echo "At least one LLM API key must be configured in repository secrets"
